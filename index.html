hr{
    border:1px solid #c9b46c;
    margin-bottom:35px;

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:25px;
    max-width:1300px;
    margin:auto;
}

.card-link{
    text-decoration:none;
    color:inherit;
    display:block;
}

.card{
    background:#FAF6DE;
    border-radius:18px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    padding:25px;
    text-align:center;
    transition:0.3s;
    height:180px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.card:hover{
    transform:translateY(-6px) scale(1.03);
}

.flag{
    font-size:52px;
    margin-bottom:15px;
}

h2{
    margin:0;
    color:#000000;
    font-size:26px;
}

.footer{

}
.home-button {
